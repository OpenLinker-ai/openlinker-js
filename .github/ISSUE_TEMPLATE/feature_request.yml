name: Feature request
description: Suggest a change that fits this repository's open-source scope.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, API, or workflow you want.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope fit
      options:
        - Core API/runtime
        - Core web UI
        - Agent Node
        - SDK
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: Compatibility, security, or migration risks
      description: Note any expected API, data model, token, or deployment impact.
    validations:
      required: false
